# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hoteldb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL Dialect (optional in Spring Boot 3+)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#register eureka client
eureka.client.service-url.defaultZone=http://localhost:8000/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# Spring Boot Admin Server URL
spring.boot.admin.client.url=http://localhost:8082

# WHERE IS THIS CLIENT SERVICE?
spring.boot.admin.client.instance.service-base-url=http://localhost:9004


# Actuator configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

#Kafka producer configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
